version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: mpp_voting_dev
      TZ: Asia/Kuala_Lumpur # 1. Syncs the Alpine container's OS time
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "timezone=Asia/Kuala_Lumpur" # 2. Forces the Postgres server config

volumes:
  postgres_data:
